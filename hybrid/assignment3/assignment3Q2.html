    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Page Background */
body {
    background-color: #f5f5f5;
}

/* Title */
h1 {
    text-align: center;
    margin: 40px 0;
    font-size: 28px;
    font-weight: 600;
    color: #333;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
}

/* Product Cards */
.product1, .product2, .product3 {
    width: 280px;
    background-color: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
    
    display: flex;
    flex-direction: column;
    align-items: center;
    
    transition: 0.3s ease;
}

/* Hover effect on card */
.product1:hover, .product2:hover, .product3:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* Images */
.product1 img,
.product2 img,
.product3 img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    margin-bottom: 15px;
}

/* Product Title */
.pd {
    font-weight: bold;
    margin: 10px 0;
}

/* Description */
.product1 p,
.product2 p,
.product3 p {
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
}

/* Price */
.price {
    color: #ff6600;
    font-weight: bold;
    margin: 10px 0;
}

/* Button */
.button {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover button */
.button:hover {
    background-color: #218838;
}

    </style>
